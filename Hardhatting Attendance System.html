document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

02Fhelmet>\n\n<div style=\"font-family:'Hanken Grotesk',system-ui,sans-serif; min-height:100vh; background:#F9EEDA; color:#121212; -webkit-font-smoothing:antialiased;\">\n\n  <!-- ===================== LOGIN ===================== -->\n  <sc-if value=\"{{ isLogin }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"min-height:100vh; display:flex; flex-wrap:wrap;\">\n    <!-- left brand banner -->\n    <div style=\"flex:1 1 460px; position:relative; overflow:hidden; background:#121212; min-height:100vh; display:flex; flex-direction:column; justify-content:flex-end;\">\n      <img src=\"83c5b527-4f2f-4041-8f3c-60ddd451a72d\" alt=\"Hardhatting Ceremony 2026 — Coded for the Future · July 1, 2026 · Bulwagang Balagtas\" style=\"position:absolute; inset:0; width:100%; height:100%; object-fit:contain; object-position:center;\">\n      <div style=\"position:absolute; inset:0; background:linear-gradient(180deg, rgba(18,18,18,0) 55%, rgba(18,18,18,.55) 100%);\"><\u002Fdiv>\n      <div style=\"position:relative; padding:26px 32px; font-size:12.5px; color:#cdbf9f; letter-spacing:.04em;\">Attendance &amp; QR Seating Management System · Front-only demonstration<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- right form -->\n    <div style=\"flex:1 1 420px; display:flex; align-items:center; justify-content:center; padding:48px 32px; min-height:100vh;\">\n      <div style=\"width:100%; max-width:380px; animation:hhcFade .5s ease both;\">\n        <div style=\"font-family:'League Gothic',sans-serif; font-size:42px; line-height:.9;\">WELCOME BACK<\u002Fdiv>\n        <p style=\"margin:10px 0 30px; color:#6b6149; font-size:14.5px;\">Sign in to access the event control system.<\u002Fp>\n\n        <label style=\"display:block; font-size:12px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:#8a7e60; margin-bottom:7px;\">Email<\u002Flabel>\n        <input value=\"{{ loginEmail }}\" oninput=\"{{ onLoginEmail }}\" placeholder=\"you@iskolarngbayan.pup.edu.ph\" style=\"width:100%; padding:13px 14px; border:1.5px solid #d8cbac; border-radius:11px; background:#fff; font-size:14.5px; font-family:inherit; outline:none; margin-bottom:18px;\">\n\n        <label style=\"display:block; font-size:12px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:#8a7e60; margin-bottom:7px;\">Password<\u002Flabel>\n        <input value=\"{{ loginPassword }}\" oninput=\"{{ onLoginPassword }}\" type=\"password\" placeholder=\"••••••••\" style=\"width:100%; padding:13px 14px; border:1.5px solid #d8cbac; border-radius:11px; background:#fff; font-size:14.5px; font-family:inherit; outline:none; margin-bottom:18px;\">\n\n        <label style=\"display:block; font-size:12px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:#8a7e60; margin-bottom:7px;\">Sign in as <span style=\"color:#c19a2e;\">(demo)<\u002Fspan><\u002Flabel>\n        <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:9px; margin-bottom:26px;\">\n          <sc-for list=\"{{ roleChips }}\" as=\"r\" hint-placeholder-count=\"4\">\n            <button onclick=\"{{ r.onClick }}\" style=\"{{ r.style }}\">\n              <sc-if value=\"{{ r.isQr }}\">\n                <svg viewBox=\"0 0 25 25\" width=\"20\" height=\"20\" fill=\"currentColor\" style=\"display:block;\" shape-rendering=\"crispEdges\">\n                  <path fill-rule=\"evenodd\" d=\"M0 0h7v7H0Z M1 1v5h5V1Z M18 0h7v7h-7Z M19 1v5h5V1Z M0 18h7v7H0Z M1 19v5h5v-5Z\"><\u002Fpath>\n                  <rect x=\"2\" y=\"2\" width=\"3\" height=\"3\"><\u002Frect>\n                  <rect x=\"20\" y=\"2\" width=\"3\" height=\"3\"><\u002Frect>\n                  <rect x=\"2\" y=\"20\" width=\"3\" height=\"3\"><\u002Frect>\n                  <rect x=\"14\" y=\"14\" width=\"2\" height=\"2\"><\u002Frect>\n                  <rect x=\"18\" y=\"14\" width=\"2\" height=\"2\"><\u002Frect>\n                  <rect x=\"22\" y=\"14\" width=\"2\" height=\"2\"><\u002Frect>\n                  <rect x=\"16\" y=\"16\" width=\"2\" height=\"2\"><\u002Frect>\n                  <rect x=\"20\" y=\"16\" width=\"2\" height=\"2\"><\u002Frect>\n                  <rect x=\"14\" y=\"18\" width=\"2\" height=\"2\"><\u002Frect>\n                  <rect x=\"18\" y=\"18\" width=\"2\" height=\"2\"><\u002Frect>\n                  <rect x=\"22\" y=\"18\" width=\"2\" height=\"2\"><\u002Frect>\n                  <rect x=\"16\" y=\"20\" width=\"2\" height=\"2\"><\u002Frect>\n                  <rect x=\"20\" y=\"20\" width=\"2\" height=\"2\"><\u002Frect>\n                  <rect x=\"14\" y=\"22\" width=\"2\" height=\"2\"><\u002Frect>\n                  <rect x=\"18\" y=\"22\" width=\"2\" height=\"2\"><\u002Frect>\n                  <rect x=\"22\" y=\"22\" width=\"2\" height=\"2\"><\u002Frect>\n                <\u002Fsvg>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ r.notQr }}\">\n                <span style=\"font-size:18px; line-height:1;\">{{ r.icon }}<\u002Fspan>\n              <\u002Fsc-if>\n              <span style=\"font-size:13.5px; font-weight:700;\">{{ r.label }}<\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <button onclick=\"{{ onLogin }}\" style=\"width:100%; padding:15px; border:none; border-radius:11px; background:#121212; color:#F9EEDA; font-family:'League Gothic',sans-serif; font-size:22px; letter-spacing:.04em; cursor:pointer;\">ENTER · {{ loginRoleLabel }}<\u002Fbutton>\n        <p style=\"text-align:center; margin-top:18px; font-size:12.5px; color:#9c9077;\">No real authentication — pick a role to explore that dashboard.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== APP (attendee / president / admin) ===================== -->\n  <sc-if value=\"{{ isApp }}\">\n  <div style=\"min-height:100vh; display:flex; flex-direction:column;\">\n    <!-- top bar -->\n    <header style=\"background:#121212; color:#F9EEDA; padding:0 22px; display:flex; align-items:cen olor:#F9EEDA; width:34px; height:34px; border-radius:9px; cursor:pointer; font-size:15px;\">⎋<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fheader>\n\n    <main style=\"flex:1; max-width:1180px; width:100%; margin:0 auto; padding:30px 22px 70px;\">\n\n      <!-- ATTENDEE / PRESIDENT DASHBOARD -->\n      <sc-if value=\"{{ tabDashboard }}\">\n        <div style=\"animation:hhcFade .4s ease both;\">\n          <div style=\"display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:14px; margin-bottom:24px;\">\n            <div>\n              <div style=\"font-size:13px; letter-spacing:.16em; color:#a0936f; font-weight:700;\">WELCOME,<\u002Fdiv>\n              <h2 style=\"font-family:'League Gothic',sans-serif; font-size:48px; line-height:.9; margin:5px 0 0;\">{{ userFirstName }}<\u002Fh2>\n            <\u002Fdiv>\n            <div style=\"display:flex; gap:10px; flex-wrap:wrap;\">\n              <div style=\"background:#121212; color:#F9EEDA; padding:12px 18px; border-radius:13px;\">\n                <div style=\"font-size:10.5px; letter-spacing:.14em; color:#8a7e60;\">YOUR BLOCK<\u002Fdiv>\n                <div style=\"font-family:'League Gothic',sans-serif; font-size:30px; line-height:1; margin-top:3px;\">{{ userBlock }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"background:#FFBF00; color:#121212; padding:12px 18px; border-radius:13px;\">\n                <div style=\"font-size:10.5px; letter-spacing:.14em; opacity:.7;\">YOUR SEAT<\u002Fdiv>\n                <div style=\"font-family:'League Gothic',sans-serif; font-size:30px; line-height:1; margin-top:3px;\">{{ userSeat }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:18px;\">\n            <!-- QR card -->\n            <div style=\"background:#fff; border:1px solid #ecdfc0; border-radius:18px; padding:24px; display:flex; flex-d an>\n                  <div><div style=\"font-size:10.5px; letter-spacing:.1em; color:#8a7e60;\">{{ f.label }}<\u002Fdiv><div style=\"font-size:14px; font-weight:600; margin-top:1px;\">{{ f.value }}<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n            <!-- status card -->\n            <div style=\"background:#fff; border:1px solid #ecdfc0; border-radius:18px; padding:24px;\">\n              <div style=\"font-size:12px; letter-spacing:.14em; font-weight:700; color:#a0936f;\">YOUR STATUS<\u002Fdiv>\n              <div style=\"margin:18px 0; display:flex; align-items:center; gap:12px;\">\n                <span style=\"width:14px; height:14px; border-radius:50%; background:{{ youStatusColor }};\"><\u002Fspan>\n                <span style=\"font-family:'League Gothic',sans-serif; font-size:34px; line-height:.9;\">{{ youStatusLabel }}<\u002Fspan>\n              <\u002Fdiv>\n              <p style=\"font-size:13px; color:#7a6f54; margin:0 0 18px;\">{{ youStatusHint }}<\u002Fp>\n              <div style=\"display:flex; gap:9px;\">\n                <div style=\"flex:1; background:#F9EEDA; border-radius:12px; padding:12px; text-align:center;\"><div style=\"font-family:'League Gothic',sans-serif; font-size:26px;\">{{ blockPresentCount }}<\u002Fdiv><div style=\"font-size:10.5px; color:#8a7e60; letter-spacing:.08em;\">PRESENT IN BLOCK<\u002Fdiv><\u002Fdiv>\n                <div style=\"flex:1; background:#F9EEDA; border-radius:12px; padding:12px; text-align:center;\"><div style=\"font-family:'League Gothic',sans-serif; font-size:26px;\">{{ blockTotalCount }}<\u002Fdiv><div style=\"font-size:10.5px; color:#8a7e60; letter-spacing:.08em;\">BLOCK SIZE<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- MY QR (full) -->\n      <sc-if value=\"{{ tabQr }}\">\n        <div style=\"animation:hhcFade .4s ease both; display:flex; flex-direction:column; align-items:center; text-align:center; padding-top:10px;\">\n          <h2 style=\"font-family:'League Gothic',sans-serif; font-size:46px; margin:0;\">YOUR CHECK-IN PASS<\u002Fh2>\n          <p style=\"color:#7a6f54; margin:6px 0 26px; max-width:420px;\">Show this QR at any gate. It encodes your unique attendee ID and seat assignment.<\u002Fp>\n          <div style=\"background:#fff; border:1px solid #ecdfc0; border-radius:22px; padding:30px; box-shadow:0 20px 50px -28px rgba(0,0,0,.35);\">\n            <div style=\"padding:18px; background:#F9EEDA; border-radius:18px; border:2px dashed #e0cf9f;\">\n              <canvas id=\"hhc-qr-large\" width=\"240\" height=\"240\" style=\"display:block; width:240px; height:240px;\"><\u002Fcanvas>\n            <\u002Fdiv>\n            <div style=\"font-family:'League Gothic',sans-serif; font-size:30px; margin-top:18px;\">{{ userName }}<\u002Fdiv>\n            <div style=\"display:flex; gap:8px; justify-content:center; margin-top:10px;\">\n              <span style=\"background:#121212; color:#F9EEDA; padding:6px 14px; border-radius:30px; font-size:12px; font-weight:600;\">{{ userBlock }}<\u002Fspan>\n              <span style=\"background:#FFBF00; color:#121212; padding:6px 14px; border-radius:30px; font-size:12px; font-weight:700;\">Seat {{ userSeat }}<\u002Fspan>\n              <span style=\"background:#F9EEDA; border:1px solid #e0cf9f; padding:6px 14px; border-radius:30px; font-size:12px; font-weight:600;\">ID {{ userId }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- SEATING (view-only / filtered) -->\n      <sc-if value=\"{{ tabSeating }}\">\n        <div style=\"animation:hhcFade .4s ease both;\">\n          <div style=\"display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:12px; margin-bottom:18px;\">\n            <div>\n              <h2 style=\"font-family:'League Gothic',sans-serif; font- ize:20px;\">{{ r.seat }}<\u002Fspan>\n                  <span><span style=\"display:inline-flex; align-items:center; gap:6px; background:{{ r.tone }}; color:{{ r.toneFg }}; padding:4px 11px; border-radius:30px; font-size:11.5px; font-weight:700;\">{{ r.statusLabel }}<\u002Fspan><\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- PROFILE -->\n      <sc-if value=\"{{ tabProfile }}\">\n        <div style=\"animation:hhcFade .4s ease both; max-width:560px;\">\n          <h2 style=\"font-family:'League Gothic',sans-serif; font-size:42px; margin:0 0 22px;\">PROFILE<\u002Fh2>\n          <div style=\"background:#fff; border:1px solid #ecdfc0; border-radius:18px; padding:26px;\">\n            <div style=\"display:flex; align-items:center; gap:16px; margin-bottom:24px;\">\n              <div style=\"width:64px; height:64px; border-radius:50%; background:#FD8602; color:#121212; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:24px;\">{{ userInitials }}<\u002Fdiv>\n              <div>\n                <div style=\"font-family:'League Gothic',sans-serif; font-size:30px; line-height:.95;\">{{ userName }}<\u002Fdiv>\n                <div style=\"display:flex; gap:7px; margin-top:6px;\">\n                  <span style=\"background:#121212; color:#F9EEDA; padding:4px 11px; border-radius:30px; font-size:11px; font-weight:600;\">{{ roleLabel }}<\u002Fspan>\n                  <sc-if value=\"{{ isPresident }}\"><span style=\"background:#FFBF00; color:#121212; padding:4px 11px; border-radius:30px; font-size:11px; font-weight:700;\">BLOCK PRESIDENT<\u002Fspan><\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <label style=\"display:block; font-size:11.5px; font-weight:700; letter-spacing:.08em; color:#8a7e60; margin-bottom:6px;\">FULL NAME<\u002Flabel>\n            <input value=\"{{ editName }}\" oninput=\"{{ onEditName }}\" disabled=\"{{ profileLocked }}\" style=\"{{ profileFieldStyle }}\">\n            <label style=\"display:block; font-size:11.5px; font-weight:700; letter-spacing:.08em; color:#8a7e60; margin:16px 0 6px;\">EMAIL<\u002Flabel>\n            <input value=\"{{ editEmail }}\" oninput=\"{{ onEditEmail }}\" disabled=\"{{ profileLocked }}\" style=\"{{ profileFieldStyle }}\">\n            <div style=\"display:flex; gap:10px; margin-top:16px;\">\n              <div style=\"flex:1; background:#F9EEDA; border-radius:12px; padding:13px 16px;\"><div style=\"font-size:10.5px; color:#8a7e60; letter-spacing:.1em;\">BLOCK<\u002Fdiv><div style=\"font-family:'League Gothic',sans-serif; font-size:24px;\">{{ userBlock }}<\u002Fdiv><\u002Fdiv>\n              <div style=\"flex:1; background:#F9EEDA; border-radius:12px; padding:13px 16px;\"><div style=\"font-size:10.5px; color:#8a7e60; letter-spacing:.1em;\">SEAT<\u002Fdiv><div style=\"font-family:'League Gothic',sans-serif; font-size:24px;\">{{ userSeat }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <button onclick=\"{{ onToggleEdit }}\" style=\"margin-top:22px; width:100%; padding:13px; border:none; border-radius:11px; background:{{ profileBtnBg }}; color:{{ profileBtnFg }}; font-weight:700; font-size:14px; cursor:pointer; font-family:'League Gothic',sans-serif; letter-spacing:.04em; font-size:18px;\">{{ profileBtnLabel }}<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===== ADMIN OVERVIEW ===== -->\n      <sc-if value=\"{{ tabOverview }}\">\n        <div style=\"animation:hhcFade .4s ease both;\">\n          <div style=\"display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:12px; margin-bottom:22px;\">\n            <div><div style=\"font-size:13px; letter-spacing:.16em; color:#a0936f; font-weight:700;\">ADMIN CONSOLE<\u002Fdiv><h2 style=\"font-family:'League Gothic',sans-serif; font-size:46px; mar le=\"background:#FFBF00; color:#121212; border:none; padding:13px 22px; border-radius:11px; font-weight:700; cursor:pointer; font-size:14px;\">⤒ Export now<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fmain>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== SCANNER ===================== -->\n  <sc-if value=\"{{ isScanner }}\">\n  <div style=\"min-height:100vh; background:#121212; color:#F9EEDA; display:flex; flex-direction:column;\">\n    <header style=\"padding:16px 20px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid rgba(249,238,218,.1);\">\n      <div style=\"display:flex; align-items:center; gap:10px;\">\n        <div style=\"width:32px; height:32px; border-radius:8px; background:linear-gradient(135deg,#FD8602,#FFBF00); display:flex; align-items:center; justify-content:center; color:#121212; font-family:'League Gothic',sans-serif; font-size:20px;\">H<\u002Fdiv>\n        <div style=\"line-height:1;\"><div style=\"font-family:'League Gothic',sans-serif; font-size:18px;\">SCANNER STATION<\u002Fdiv><div style=\"font-size:9.5px; letter-spacing:.18em; color:#8a7e60; margin-top:2px;\">{{ scannerName }}<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <button onclick=\"{{ onLogout }}\" style=\"background:rgba(249,238,218,.08); border:1px solid rgba(249,238,218,.16); color:#F9EEDA; padding:8px 12px; border-radius:9px; cursor:pointer; font-size:12px;\">Sign out<\u002Fbutton>\n    <\u002Fheader>\n\n    <div style=\"flex:1; width:100%; max-width:440px; margin:0 auto; padding:22px 18px 40px; display:flex; flex-direction:column;\">\n      <!-- stats -->\n      <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:9px; margin-bottom:18px;\">\n        <div style=\"background:rgba(249,238,218,.06); border-radius:13px; padding:13px; text-align:center;\"><div style=\"font-family:'League Gothic',sans-serif; font-size:32px; line-height:.9;\">{{ scanTotal }}<\u002Fdiv><div style=\"font-size:10px; letter-spacing:.08em; color:#8a7e60; margin-top:3px;\">SCANS<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:rgba(46,125,82,.16); border-radius:13px; padding:13px; text-align:center;\"><div style=\"font-family:'League Gothic',sans-serif; font-size:32px; line-height:.9; color:#5fd49a;\">{{ scanSuccess }}<\u002Fdiv><div style=\"font-size:10px; letter-spacing:.08em; color:#8a7e60; margin-top:3px;\">SUCCESS<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:rgba(255,191,0,.14); border-radius:13px; padding:13px; text-align:center;\"><div style=\"font-family:'League Gothic',sans-serif; font-size:32px; line-height:.9; color:#FFBF00;\">{{ scanDup }}<\u002Fdiv><div style=\"font-size:10px; letter-spacing:.08em; color:#8a7e60; margin-top:3px;\">DUPLICATES<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- camera viewport -->\n      <div style=\"position:relative; aspect-ratio:1/1; background:#000; border-radius:22px; overflow:hidden; border:1px solid rgba(249,238,218,.14);\">\n        <div id=\"hhc-camera\" ref=\"{{ setCamera }}\" style=\"position:absolute; inset:0; width:100%; height:100%;\"><\u002Fdiv>\n        <sc-if value=\"{{ cameraIdle }}\">\n          <div style=\"position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:24px;\">\n            <div style=\"width:74px; height:74px; border-radius:50%; background:rgba(255,191,0,.14); display:flex; align-items:center; justify-content:center; font-size:34px; margin-bottom:14px;\">▢<\u002Fdiv>\n            <div style=\"font-family:'League Gothic',sans-serif; font-size:26px;\">CAMERA OFF<\u002Fdiv>\n            <p style=\"font-size:12.5px; color:#8a7e60; margin:6px 24px 0;\">Start the camera to scan attendee QR codes, or simulate a scan below.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ scanningOn }}\">\n          <div style=\"position:absolute; left:12%; right:12%; top:12%; bottom:12%; border:2px solid rgba(255,191,0,.85); border-radius:18px; pointer-events:none;\"><\u002Fdiv>\n          <div style=\"position:absolute; left:12%; right:12%; height:2px; background:linear-gradient(90deg,transparent,#FFBF00,transparent); animation:hhcSweep 2.4s ease-in-out infinite; pointer-events:none;\"><\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <!-- controls -->\n      <div style=\"display:flex; gap:10px; margin-top:16px;\">\n        <button onclick=\"{{ onToggleCamera }}\" style=\"flex:1; padding:15px; border:none; border-radius:13px; background:{{ camBtnBg }}; color:{{ camBtnFg }}; font-family:'League Gothic',sans-serif; font-size:20px; letter-spacing:.03em; cursor:pointer;\">{{ camBtnLabel }}<\u002Fbutton>\n        <button onclick=\"{{ onSimScan }}\" style=\"flex:1; padding:15px; border:none; border-radius:13px; background:#FFBF00; color:#121212; font-family:'League Gothic',sans-serif; font-size:20px; letter-spacing:.03em; cursor:pointer;\">SIMULATE SCAN<\u002Fbutton>\n      <\u002Fdiv>\n\n      <!-- manual + toggles -->\n      <div style=\"margin-top:14px; background:rgba(249,238,218,.05); border-radius:15px; padding:16px;\">\n        <div style=\"font-size:11px; letter-spacing:.12em; color:#8a7e60; font-weight:700; margin-bottom:9px;\">MANUAL OVERRIDE<\u002Fdiv>\n        <div style=\"display:flex; gap:8px;\">\n          <input value=\"{{ manualVal }}\" oninput=\"{{ onManualInput }}\" placeholder=\"Seat or ID (e.g. C12)\" style=\"flex:1; padding:11px 13px; border:1px solid rgba(249,238,218,.18); border-radius:10px; background:rgba(0,0,0,.3); color:#F9EEDA; font-size:13.5px; font-family:inherit; outline:none;\">\n          <button onclick=\"{{ onManualScan }}\" style=\"padding:11px 18px; border:none; border-radius:10px; background:#F9EEDA; color:#121212; font-weight:700; cursor:pointer; font-size:13.5px;\">Check<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:10px; margin-top:14px;\">\n          <button onclick=\"{{ onToggleOffline }}\" style=\"{{ offlineToggleStyle }}\"><span>{{ offlineDot }}<\u002Fspan> Offline mode<\u002Fbutton>\n          <button onclick=\"{{ onToggleSound }}\" style=\"{{ soundToggleStyle }}\"><span>{{ soundIcon }}<\u002Fspan> Sound<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== SCAN RESULT MODAL ===================== -->\n  <sc-if value=\"{{ hasScanResult }}\">\n    <div onclick=\"{{ onScanNext }}\" style=\"position:fixed; inset:0; background:rgba(0,0,0,.6); backdrop-filter:blur(3px); z-index:90; display:flex; align-items:center; justify-content:center; padding:22px;\">\n      <div style=\"width:100%; max-width:380px; background:#fff; border-radius:24px; overflow:hidden; animation:hhcPop .28s cubic-bezier(.2,.9,.3,1.3) both;\">\n        <div style=\"background:{{ scanResultColor }}; padding:30px 24px; text-align:center; color:#fff;\">\n          <div style=\"font-size:54px; line-height:1;\">{{ scanResultIcon }}<\u002Fdiv>\n          <div style=\"font-family:'League Gothic',sans-serif; font-size:40px; line-height:.9; margin-top:10px; letter-spacing:.02em;\">{{ scanResultTitle }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:24px;\">\n          <div style=\"font-weight:800; font-size:20px;\">{{ scanResultName }}<\u002Fdiv>\n          <div style=\"display:flex; gap:8px; margin:12px 0 18px; flex-wrap:wrap;\">\n            <span style=\"background:#F9EEDA; padding:6px 13px; border-radius:30px; font-size:12.5px; font-weight:600;\">{{ scanResultBlock }}<\u002Fspan>\n            <span style=\"background:#121212; color:#F9EEDA; padding:6px 13px; border-radius:30px; font-size:12.5px; font-weight:600;\">Seat {{ scanResultSeat }}<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"font-size:13px; color:#7a6f54; margin:0 0 20px;\">{{ scanResultSub }}<\u002Fp>\n          <button onclick=\"{{ onScanNext }}\" style=\"width:100%; padding:15px; border:none; border-radius:13px; background:#121212; color:#F9EEDA; font-family:'League Gothic',sans-serif; font-size:21px; letter-spacing:.03em; cursor:pointer;\">READY FOR NEXT<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== TOAST ===================== -->\n  <sc-if value=\"{{ hasToast }}\">\n    <div style=\"position:fixed; bottom:26px; left:50%; transform:translateX(-50%); z-index:95; background:#121212; color:#F9EEDA; padding:14px 22px; border-radius:13px; font-size:13.5px; font-weight:600; box-shadow:0 16px 40px -16px rgba(0,0,0,.6); display:flex; align-items:center; gap:10px; animation:hhcPop .25s ease both; max-width:90vw;\">\n      <span style=\"color:{{ toastColor }}; font-size:16px;\">{{ toastIcon }}<\u002Fspan>{{ toastMsg }}\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.data = this.buildData();\n    this.state = {\n      screen:'login', role:'attendee',\n      loginEmail:'', loginPassword:'', loginRole:'attendee',\n      currentUser:null, tab:'',\n      // seating\n      seatSearch:'', fBlock:'all', fStatus:'all', cellSize:22, selectedSeat:null,\n      // profile\n      profileEdit:false, editName:'', editEmail:'',\n      // scanner\n      scanningOn:false, cameraReady:false, soundOn:true, offlineOn:false,\n      manualVal:'', scanResult:null,\n      scanStats:{ total:128, success:104, dup:11 },\n      // import\n      importActive:false, importStage:'', importPct:'0%', importDone:false,\n      importValid:0, importErrors:0, importTotal:0,\n      // misc\n      toast:null, libTick:0\n    };\n    // stable ref callbacks\n    this.setQrSmall = (n)=>{ this.qrSmall=n; this.drawQR(); };\n    this.setQrLarge = (n)=>{ this.qrLarge=n; this.drawQR(); };\n    this.setCamera = (n)=>{ this.cameraNode=n; };\n  }\n\n  /* ---------- data ---------- */\n  buildData(){\n    const FIRST=[\"Juan\",\"Maria\",\"Jose\",\"Andrea\",\"Mark\",\"Patricia\",\"John\",\"Angel\",\"Paolo\",\"Camille\",\"Miguel\",\"Sofia\",\"Gabriel\",\"Bea\",\"Rafael\",\"Nicole\",\"Carlo\",\"Hannah\",\"Daniel\",\"Kyla\",\"Vincent\",\"Trisha\",\"Joshua\",\"Erika\",\"Christian\",\"Mae\",\"Aaron\",\"Jasmine\",\"Kevin\",\"Liza\",\"Bryan\",\"Denise\",\"Adrian\",\"Cassandra\",\"Ralph\",\"Yna\",\"Diego\",\"Ella\",\"Lance\",\"Faith\",\"Neil\",\"Pia\",\"Owen\",\"Mika\",\"Seth\"];\n    const LAST=[\"Santos\",\"Reyes\",\"Cruz\",\"Bautista\",\"Garcia\",\"Mendoza\",\"Torres\",\"Flores\",\"Ramos\",\"Aquino\",\"Castillo\",\"Gonzales\",\"Villanueva\",\"De Leon\",\"Fernandez\",\"Domingo\",\"Rivera\",\"Salazar\",\"Navarro\",\"Pascual\",\"Tan\",\"Lim\",\"Ocampo\",\"Manalo\",\"Soriano\",\"Dela Rosa\",\"Marquez\",\"Velasco\",\"Aguilar\",\"Padilla\"];\n    const scanners=[\"Gate A · Reyes\",\"Gate B · Santos\",\"Lobby · Cruz\"];\n    const rnd=(a)=>a[Math.floor(Math.random()*a.length)];\n    const seats=[], attendees=[], attMap={};\n    let aid=1;\n    for(let i=0;i<500;i++){\n      const row=Math.floor(i/20), col=i%20;\n      const label=String.fromCharCode(65+row)+(col+1);\n      const blockId=\"Block \"+String.fromCharCode(65+Math.floor(row/5));\n      const seat={index:i,row,col,label,blockId,attendeeId:null};\n      const r=Math.random();\n      if(r<0.06){ seats.push(seat); continue; }\n      let status,checkIn=null,scanner=null;\n      const s=Math.random();\n      if(s<0.64){ status=\"present\"; checkIn=420+Math.floor(Math.random()*285); scanner=rnd(scanners); }\n      else if(s<0.84){ status=\"assigned\"; }\n      else if(s<0.955){ status=\"no-show\"; }\n      else { status=\"flagged\"; if(Math.random()<0.6){ checkIn=420+Math.floor(Math.random()*285); scanner=rnd(scanners);} }\n      const name=rnd(FIRST)+\" \"+rnd(LAST);\n      const id=\"A\"+String(aid++).padStart(4,\"0\");\n      const email=name.toLowerCase().replace(/[^a-z]+/g,\".\")+\"@iskolarngbayan.pup.edu.ph\";\n      const att={ id,name,email,block:blockId,seat:label,seatIndex:i,row,col,status,checkIn,scanner };\n      seat.attendeeId=id; attendees.push(att); attMap[id]=att;\n      seats.push(seat);\n    }\n    return { seats, attendees, attMap, scanners };\n  }\n\n  m2t(m){ if(m==null) return \"—\"; let h=Math.floor(m/60), mm=m%60; const ap=h>=12?\"PM\":\"AM\"; let hh=h%12; if(hh===0)hh=12; return hh+\":\"+String(mm).padStart(2,\"0\")+\" \"+ap; }\n\n  STATUS(){ return {\n    \"available\":{c:\"#D8D0BE\", fg:\"#5f5640\", label:\"Available\"},\n    \"assigned\":{c:\"#3A3A3A\", fg:\"#F9EEDA\", label:\"Assigned\"},\n    \"present\":{c:\"#2E7D52\", fg:\"#fff\", label:\"Present\"},\n    \"no-show\":{c:\"#C2402F\", fg:\"#fff\", label:\"No-show\"},\n    \"flagged\":{c:\"#FFBF00\", fg:\"#121212\", label:\"Flagged\"}\n  }; }\n\n  /* ---------- lifecycle ---------- */\n  componentDidMount(){\n    let tries=0;\n    this.libTimer=setInterval(()=>{\n      tries++;\n      if(window.qrcode){ this.drawQR(); }\n      if(window.qrcode || tries>30){ clearInterval(this.libTimer); }\n    },350);\n  }\n  componentDidUpdate(){\n    const cur=this.state.screen+\"|\"+this.state.tab+\"|\"+(this.state.currentUser&&this.state.currentUser.id);\n    if(cur!==this._lastView){\n      const wasScanner=(this._lastView||\"\").indexOf(\"scanner|\")===0;\n      this._lastView=cur;\n      this.scheduleQR();\n      if(wasScanner && this.state.screen!==\"scanner\"){ this.stopCamera(); }\n    }\n  }\n  componentWillUnmount(){ if(this.libTimer) clearInterval(this.libTimer); this.stopCamera(); }\n\n  drawQR(){\n    const gen=window.qrcode;\n    if(!gen) return;\n    const u=this.state.currentUser; if(!u) return;\n    const text=\"HHC2026:\"+(u.id||\"GUEST\")+\":\"+(u.seat||\"NA\");\n    const render=(id,size)=>{\n      const canvas=document.getElementById(id);\n      if(!canvas) return;\n      let qr; try{ qr=gen(0,\"M\"); qr.addData(text); qr.make(); }catch(e){ return; }\n      const n=qr.getModuleCount();\n      const ctx=canvas.getContext(\"2d\");\n      canvas.width=size; canvas.height=size;\n      const cell=size/(n+2);\n      ctx.fillStyle=\"#F9EEDA\"; ctx.fillRect(0,0,size,size);\n      ctx.fillStyle=\"#121212\";\n      for(let r=0;r<n;r++){ for(let c=0;c<n;c++){ if(qr.isDark(r,c)){ ctx.fillRect(Math.floor((c+1)*cell),Math.floor((r+1)*cell),Math.ceil(cell),Math.ceil(cell)); } } }\n    };\n    render(\"hhc-qr-small\",150); render(\"hhc-qr-large\",240);\n  }\n  scheduleQR(){ requestAnimationFrame(()=>this.drawQR()); setTimeout(()=>this.drawQR(),120); setTimeout(()=>this.drawQR(),360); }\n\n  /* ---------- toast ---------- */\n  showToast(msg,tone){ if(this.toastT) clearTimeout(this.toastT); this.setState({toast:{msg,tone:tone||\"ok\"}}); this.toastT=setTimeout(()=>this.setState({toast:null}),2600); }\n\n  /* ---------- auth ---------- */\n  pickUser(role){\n    if(role===\"admin\") return {role:\"admin\",name:\"Admin Console\",email:\"admin@hardhatting2026.org\",initials:\"AD\"};\n    if(role===\"scanner\") return {role:\"scanner\",name:\"Scanner Station\",scanner:\"Gate A · Reyes\",initials:\"SC\"};\n    const pres = this.data.attendees.find(a=>a.block===\"Block C\" && a.status===\"present\") || this.data.attendees[0];\n    const u = Object.assign({}, pres, {role:role});\n    if(role===\"president\"){ u.presidentBlock=\"Block C\"; }\n    u.initials = u.name.split(\" \").map(x=>x[0]).slice(0,2).join(\"\").toUpperCase();\n    return u;\n  }\n  login(){\n    const role=this.state.loginRole;\n    const u=this.pickUser(role);\n    const screen = (role===\"scanner\")?\"scanner\":(role===\"admin\")?\"app\":\"app\";\n    const tab = role===\"admin\"?\"overview\":(role===\"scanner\")?\"\":\"dashboard\";\n    this.setState({ currentUser:u, role, screen:(role===\"scanner\"?\"scanner\":\"app\"), tab,\n      editName:u.name||\"\", editEmail:u.email||\"\", profileEdit:false });\n    setTimeout(()=>this.drawQR(),60);\n  }\n  logout(){ this.stopCamera(); this.setState({screen:\"login\", currentUser:null, tab:\"\", selectedSeat:null, scanResult:null}); }\n\n  /* ---------- scanner ---------- */\n  toggleCamera(){ if(this.state.scanningOn){ this.stopCamera(); } else { this.startCamera(); } }\n  startCamera(){\n    if(!window.Html5Qrcode){ this.showToast(\"Camera library still loading…\",\"warn\"); return; }\n    if(!document.getElementById(\"hhc-camera\")){ return; }\n    try{\n      this.html5 = new window.Html5Qrcode(\"hhc-camera\");\n      this.html5.start({facingMode:\"environment\"},{fps:10,qrbox:200},\n        (txt)=>this.onDecode(txt), ()=>{}).then(()=>{\n          this.setState({scanningOn:true});\n        }).catch(()=>{ this.showToast(\"Camera unavailable — use Simulate Scan\",\"warn\"); this.html5=null; });\n    }catch(e){ this.showToast(\"Camera unavailable — use Simulate Scan\",\"warn\"); }\n  }\n  stopCamera(){\n    if(this.html5){ try{ this.html5.stop().then(()=>{ try{this.html5.clear();}catch(e){} this.html5=null; }).catch(()=>{this.html5=null;}); }catch(e){ this.html5=null; } }\n    if(this.state.scanningOn) this.setState({scanningOn:false});\n  }\n  onDecode(txt){\n    if(this.state.scanResult) return; // wait for reset\n    let att=null;\n    if(typeof txt===\"string\" && txt.indexOf(\"HHC2026:\")===0){ const id=txt.split(\":\")[1]; att=this.data.attMap[id]; }\n    this.processScan(att);\n  }\n  beep(ok){\n    if(!this.state.soundOn) return;\n    try{ const ctx=new (window.AudioContext||window.webkitAudioContext)(); const o=ctx.createOscillator(); const g=ctx.createGain();\n      o.connect(g); g.connect(ctx.destination); o.frequency.value=ok?880:240; g.gain.value=0.06; o.start();\n      setTimeout(()=>{o.stop(); ctx.close();}, ok?120:200);\n    }catch(e){}\n  }\n  randAttendee(){ const a=this.data.attendees; return a[Math.floor(Math.random()*a.length)]; }\n  simulateScan(){ this.processScan(this.randAttendee()); }\n  manualScan(){\n    const v=(this.state.manualVal||\"\").trim().toUpperCase();\n    if(!v){ this.showToast(\"Enter a seat or ID\",\"warn\"); return; }\n    let att=this.data.attendees.find(a=>a.seat===v || a.id===v);\n    this.setState({manualVal:\"\"});\n    if(att) this.processScan(att,\"override\"); else this.processScan(null,\"invalid\");\n  }\n  processScan(att, force){\n    let outcome;\n    if(force===\"override\"){ outcome=\"success\"; }\n    else if(force===\"invalid\"){ outcome=\"invalid\"; }\n    else { const r=Math.random(); outcome = r<0.70?\"success\": r<0.85?\"duplicate\": r<0.95?\"invalid\":\"wrong\"; }\n    const S=this.STATUS();\n    let res;\n    if(outcome===\"success\"){ const a=att||this.randAttendee(); res={tone:\"#2E7D52\",icon:\"✓\",title:\"CHECKED IN\",name:a.name,seat:a.seat,block:a.block,sub:force===\"override\"?\"Manual override accepted. Attendance recorded.\":\"Welcome! Attendance recorded successfully.\"}; this.beep(true); }\n    else if(outcome===\"duplicate\"){ const a=att||this.randAttendee(); res={tone:\"#D99514\",icon:\"!\",title:\"DUPLICATE\",name:a.name,seat:a.seat,block:a.block,sub:\"This attendee has already been checked in.\"}; this.beep(false); }\n    else if(outcome===\"invalid\"){ res={tone:\"#C2402F\",icon:\"×\",title:\"INVALID CODE\",name:\"Unrecognized QR\",seat:\"—\",block:\"—\",sub:\"This code is not a valid attendee pass.\"}; this.beep(false); }\n    else { res={tone:\"#C2402F\",icon:\"⊘\",title:\"WRONG EVENT\",name:\"Different event pass\",seat:\"—\",block:\"—\",sub:\"This pass belongs to another event.\"}; this.beep(false); }\n    const ss=Object.assign({},this.state.scanStats);\n    ss.total++; if(outcome===\"success\") ss.success++; if(outcome===\"duplicate\") ss.dup++;\n    this.setState({scanResult:res, scanStats:ss});\n  }\n  scanNext(){ this.setState({scanResult:null}); }\n\n  /* ---------- seating ---------- */\n  selectSeat(label){ this.setState({selectedSeat:this.state.selectedSeat===label?null:label}); }\n  refresh(){\n    // flip a few assigned -> present to simulate live updates\n    const pend=this.data.attendees.filter(a=>a.status===\"assigned\");\n    let n=Math.min(pend.length, 3+Math.floor(Math.random()*5));\n    for(let i=0;i<n;i++){ const a=pend[Math.floor(Math.random()*pend.length)]; if(a && a.status===\"assigned\"){ a.status=\"present\"; a.checkIn=420+Math.floor(Math.random()*300); a.scanner=this.data.scanners[Math.floor(Math.random()*3)]; } }\n    this.forceUpdate(); this.showToast(\"Live data refreshed\",\"ok\");\n  }\n  zoom(d){ this.setState(s=>({cellSize:Math.max(12,Math.min(40,s.cellSize+d))})); }\n\n  /* ---------- profile ---------- */\n  toggleEdit(){\n    if(this.state.profileEdit){\n      const u=Object.assign({},this.state.currentUser,{name:this.state.editName,email:this.state.editEmail});\n      u.initials=(this.state.editName||\"  \").split(\" \").map(x=>x[0]).slice(0,2).join(\"\").toUpperCase();\n      this.setState({profileEdit:false,currentUser:u}); this.showToast(\"Profile updated\",\"ok\");\n    } else { this.setState({profileEdit:true}); }\n  }\n\n  /* ---------- import/export ---------- */\n  runImport(){\n    this.setState({importActive:true,importDone:false,importStage:\"Uploading file…\",importPct:\"0%\"});\n    const steps=[[\"Uploading file…\",\"18%\"],[\"Parsing rows…\",\"46%\"],[\"Validating data…\",\"74%\"],[\"Finalizing…\",\"92%\"],[\"Complete\",\"100%\"]];\n    let i=0;\n    const tick=()=>{ const [stage,pct]=steps[i]; this.setState({importStage:stage,importPct:pct}); i++;\n      if(i<steps.length){ this.importT=setTimeout(tick,520); }\n      else { this.setState({importDone:true,importValid:498,importErrors:2,importTotal:500}); this.showToast(\"Import complete · 498 added\",\"ok\"); }\n    };\n    tick();\n  }\n  sampleCsv(){\n    const csv=\"attendee_id,name,email,block,seat\\nA0001,Juan Santos,juan.santos@iskolarngbayan.pup.edu.ph,Block A,A1\\nA0002,Maria Cruz,maria.cruz@iskolarngbayan.pup.edu.ph,Block A,A2\\n\";\n    this.download(\"hardhatting2026_sample.csv\",csv); this.showToast(\"Sample CSV downloaded\",\"ok\");\n  }\n  exportData(){\n    let csv=\"attendee_id,name,email,block,seat,status,check_in,scanner\\n\";\n    this.data.attendees.forEach(a=>{ csv+=[a.id,'\"'+a.name+'\"',a.email,a.block,a.seat,a.status,this.m2t(a.checkIn),'\"'+(a.scanner||\"\")+'\"'].join(\",\")+\"\\n\"; });\n    this.download(\"hardhatting2026_attendance.csv\",csv); this.showToast(\"Attendance exported\",\"ok\");\n  }\n  download(name,text){ try{ const b=new Blob([text],{type:\"text/csv\"}); const u=URL.createObjectURL(b); const a=document.createElement(\"a\"); a.href=u; a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(u),1000);}catch(e){} }\n\n  /* ---------- derived helpers ---------- */\n  metricsData(){\n    const A=this.data.attendees;\n    const present=A.filter(a=>a.status===\"present\").length;\n    const noShow=A.filter(a=>a.status===\"no-show\").length;\n    const flagged=A.filter(a=>a.status===\"flagged\").length;\n    const total=A.length;\n    const pct=Math.round(present/total*100);\n    return {total,present,noShow,flagged,pct,dup:this.state.scanStats.dup};\n  }\n\n  renderVals(){\n    const st=this.state, U=st.currentUser||{}, S=this.STATUS();\n    const role=st.role;\n    const isApp = st.screen===\"app\";\n    const isAttendeeLike = isApp && (role===\"attendee\"||role===\"president\");\n    const isAdmin = isApp && role===\"admin\";\n    const isPresident = role===\"president\";\n\n    // ---- login ----\n    const roles=[[\"attendee\",\"Attendee\",\"◉\"],[\"president\",\"Block President\",\"★\"],[\"scanner\",\"Scanner\",\"▦\"],[\"admin\",\"Admin\",\"◆\"]];\n    const roleChips=roles.map(([id,label,icon])=>({\n      label, icon, isQr:id===\"scanner\", notQr:id!==\"scanner\", onClick:()=>this.setState({loginRole:id}),\n      style:`display:flex; flex-direction:column; align-items:center; gap:6px; padding:14px 8px; border-radius:12px; cursor:pointer; font-family:inherit; transition:all .15s; border:1.5px solid ${st.loginRole===id?\"#121212\":\"#d8cbac\"}; background:${st.loginRole===id?\"#121212\":\"#fff\"}; color:${st.loginRole===id?\"#F9EEDA\":\"#121212\"};`\n    }));\n    const roleLabelMap={attendee:\"Attendee\",president:\"Block President\",scanner:\"Scanner\",admin:\"Admin\"};\n\n    const orgMarks=[\n      {mono:\"A\", label:\"ACCESS\", bg:\"#FD8602\", fg:\"#121212\"},\n      {mono:\"CpE\", label:\"PUP COMPUTER ENGINEERING\", bg:\"#F9EEDA\", fg:\"#121212\"},\n      {mono:\"IS\", label:\"ICPEP.SE – PUP\", bg:\"#FFBF00\", fg:\"#121212\"}\n    ];\n\n    // ---- nav tabs ----\n    let tabsDef=[];\n    if(isAdmin) tabsDef=[[\"overview\",\"Overview\"],[\"adminseating\",\"Seating Map\"],[\"import\",\"Import & Export\"]];\n    else if(isPresident) tabsDef=[[\"dashboard\",\"Dashboard\"],[\"qr\",\"My QR\"],[\"seating\",\"Seating\"],[\"oversight\",\"Block Oversight\"],[\"profile\",\"Profile\"]];\n    else tabsDef=[[\"dashboard\",\"Dashboard\"],[\"qr\",\"My QR\"],[\"seating\",\"Seating\"],[\"profile\",\"Profile\"]];\n    const navTabs=tabsDef.map(([id,label])=>({\n      label, onClick:()=>{ this.setState({tab:id, selectedSeat:null}); this.scheduleQR(); },\n      style:`white-space:nowrap; border:none; cursor:pointer; font-family:inherit; font-weight:600; font-size:13.5px; padding:9px 15px; border-radius:9px; transition:all .15s; background:${st.tab===id?\"#FFBF00\":\"transparent\"}; color:${st.tab===id?\"#121212\":\"#cbbf9f\"};`\n    }));\n\n    // ---- user ----\n    const userName=U.name||\"\", userFirstName=(U.name||\"\").split(\" \")[0]||\"\";\n    const userInitials=U.initials||\"··\";\n    const youStatus=U.status||\"assigned\";\n\n    // ---- seating compute ----\n    const presScope = U.presidentBlock || null;\n    const viewOnly = isAttendeeLike;\n    const q=(st.seatSearch||\"\").trim().toLowerCase();\n    const filtersActive = (st.fBlock!==\"all\"||st.fStatus!==\"all\"||!!q);\n    const cell=st.cellSize, fs=Math.max(7,Math.round(cell*0.36));\n    const seats=this.data.seats.map(seat=>{\n      const att=seat.attendeeId?this.data.attMap[seat.attendeeId]:null;\n      const status=att?att.status:\"available\";\n      const sc=S[status];\n      const isYou = att && U.id && att.id===U.id;\n      let visibleScope = presScope ? seat.blockId===presScope : true;\n      let match=true;\n      if(q){ match=(seat.label.toLowerCase()===q)||(att&&(att.name.toLowerCase().includes(q)||att.email.toLowerCase().includes(q))); }\n      if(st.fBlock!==\"all\" && seat.blockId!==st.fBlock) match=false;\n      if(st.fStatus!==\"all\" && status!==st.fStatus) match=false;\n      let dim = !visibleScope || (filtersActive && !match);\n      const sel = st.selectedSeat===seat.label;\n      const ring = isYou?\"#FD8602\":(sel?\"#121212\":(q&&match&&seat.label.toLowerCase()===q?\"#121212\":null));\n      const style=`width:${cell}px; height:${cell}px; border-radius:${Math.max(3,cell*0.18)}px; display:flex; align-items:center; justify-content:center; font-size:${fs}px; font-weight:700; cursor:pointer; user-select:none; background:${sc.c}; color:${sc.fg}; opacity:${dim?0.16:1}; outline:${ring?(\"2.5px solid \"+ring):\"none\"}; outline-offset:1px; box-shadow:${isYou?\"0 0 0 4px rgba(253,134,2,.2)\":\"none\"}; transition:opacity .2s;`;\n      const title=att?`${seat.label} · ${att.name} · ${sc.label}`:`${seat.label} · Available`;\n      return { key:seat.label, label:seat.label, style, title, tag:(cell>=18?seat.label.replace(/[A-Z]/,\"\"):\"\"), onClick:()=>this.selectSeat(seat.label) };\n    });\n    const legend=Object.keys(S).map(k=>({color:S[k].c,label:S[k].label}));\n\n    // ---- selected seat ----\n    const selSeatObj = st.selectedSeat ? this.data.seats.find(s=>s.label===st.selectedSeat) : null;\n    const selAtt = selSeatObj && selSeatObj.attendeeId ? this.data.attMap[selSeatObj.attendeeId] : null;\n    const selStatus = selAtt?selAtt.status:\"available\";\n    const selFields = selAtt ? [\n      {label:\"ATTENDEE\", value:selAtt.name},\n      {label:\"EMAIL\", value:selAtt.email},\n      {label:\"BLOCK\", value:selAtt.block},\n      {label:\"CHECK-IN\", value:selAtt.checkIn?this.m2t(selAtt.checkIn)+\" · \"+selAtt.scanner:\"Not yet checked in\"}\n    ] : [ {label:\"STATUS\", value:\"This seat is available / unassigned\"} ];\n\n    // ---- block (for attendee status card / president) ----\n    const myBlockId = U.block || presScope;\n    const blockMembers = this.data.attendees.filter(a=>a.block===myBlockId);\n    const blockPresentCount = blockMembers.filter(a=>a.status===\"present\").length;\n    const blockTotalCount = blockMembers.length;\n\n    // ---- president roster + stats ----\n    const roster=blockMembers.slice().sort((a,b)=>a.seat.localeCompare(b.seat,undefined,{numeric:true})).map(a=>({\n      name:a.name, email:a.email, seat:a.seat,\n      statusLabel:S[a.status].label, tone:S[a.status].c, toneFg:S[a.status].fg\n    }));\n    const pPresent=blockMembers.filter(a=>a.status===\"present\").length;\n    const pAssigned=blockMembers.filter(a=>a.status===\"assigned\").length;\n    const pNoShow=blockMembers.filter(a=>a.status===\"no-show\").length;\n    const blockStats=[\n      {value:blockMembers.length,label:\"TOTAL ASSIGNED\",bg:\"#fff\",fg:\"#121212\"},\n      {value:pPresent,label:\"PRESENT\",bg:\"#2E7D52\",fg:\"#fff\"},\n      {value:pAssigned,label:\"ABSENT\",bg:\"#fff\",fg:\"#121212\"},\n      {value:pNoShow,label:\"NO-SHOW\",bg:\"#C2402F\",fg:\"#fff\"}\n    ];\n\n    // ---- admin metrics ----\n    const M=this.metricsData();\n    const metrics=[\n      {label:\"TOTAL REGISTERED\",value:M.total,sub:\"of 500 seats\",bg:\"#fff\",fg:\"#121212\"},\n      {label:\"PRESENT\",value:M.present,sub:\"checked in\",bg:\"#121212\",fg:\"#F9EEDA\"},\n      {label:\"ATTENDANCE\",value:M.pct+\"%\",sub:\"turnout rate\",bg:\"#FFBF00\",fg:\"#121212\"},\n      {label:\"DUPLICATE SCANS\",value:M.dup,sub:\"flagged today\",bg:\"#fff\",fg:\"#121212\"},\n      {label:\"NO-SHOWS\",value:M.noShow,sub:\"absent\",bg:\"#fff\",fg:\"#121212\"}\n    ];\n\n    // ---- chart ----\n    const buckets={}; [7,8,9,10,11,12].forEach(h=>buckets[h]=0);\n    this.data.attendees.forEach(a=>{ if(a.checkIn!=null){ const h=Math.floor(a.checkIn/60); if(buckets[h]!=null) buckets[h]++; } });\n    const maxB=Math.max(1,...Object.values(buckets));\n    const labelH=(h)=>{ const ap=h>=12?\"PM\":\"AM\"; let hh=h%12; if(hh===0)hh=12; return hh+ap; };\n    const chartBars=[7,8,9,10,11,12].map(h=>({value:buckets[h],label:labelH(h),height:Math.max(4,Math.round(buckets[h]/maxB*100))+\"%\"}));\n    const _hrs=[7,8,9,10,11,12], _n=_hrs.length, _pad=7;\n    const _pts=_hrs.map((h,i)=>{ const x=_pad+(i/(_n-1))*(100-2*_pad); const y=84-(buckets[h]/maxB)*64; return {x,y,value:buckets[h],label:labelH(h)}; });\n    const chartLine=_pts.map((p,i)=>(i===0?\"M\":\"L\")+\" \"+p.x.toFixed(2)+\" \"+p.y.toFixed(2)).join(\" \");\n    const chartArea=\"M \"+_pts[0].x.toFixed(2)+\" 100 \"+_pts.map(p=>\"L \"+p.x.toFixed(2)+\" \"+p.y.toFixed(2)).join(\" \")+\" L \"+_pts[_n-1].x.toFixed(2)+\" 100 Z\";\n    const chartPoints=_pts.map(p=>({left:p.x.toFixed(2)+\"%\", top:p.y.toFixed(2)+\"%\", value:p.value, label:p.label}));\n\n    // ---- activity ----\n    const activity=this.data.attendees.filter(a=>a.checkIn!=null).sort((a,b)=>b.checkIn-a.checkIn).slice(0,10).map(a=>({\n      name:a.name, seat:a.seat, block:a.block.replace(\"Block \",\"Blk \"), scanner:(a.scanner||\"\").split(\" · \")[0], time:this.m2t(a.checkIn),\n      dot:a.status===\"flagged\"?\"#FFBF00\":\"#2E7D52\"\n    }));\n\n    // ---- block table ----\n    const blockTable=[\"A\",\"B\",\"C\",\"D\",\"E\"].map(L=>{\n      const id=\"Block \"+L; const mem=this.data.attendees.filter(a=>a.block===id);\n      const present=mem.filter(a=>a.status===\"present\").length;\n      const absent=mem.filter(a=>a.status===\"assigned\").length;\n      const noShow=mem.filter(a=>a.status===\"no-show\").length;\n      const pct=mem.length?Math.round(present/mem.length*100):0;\n      return {block:id,total:mem.length,present,absent,noShow,pct:pct+\"%\"};\n    });\n\n    // ---- filters options ----\n    const blockOptions=[{value:\"all\",label:\"All blocks\"}].concat([\"A\",\"B\",\"C\",\"D\",\"E\"].map(L=>({value:\"Block \"+L,label:\"Block \"+L})));\n    const statusOptions=[{value:\"all\",label:\"All statuses\"}].concat(Object.keys(S).map(k=>({value:k,label:S[k].label})));\n\n    // ---- scanner derived ----\n    const sr=st.scanResult;\n\n    // ---- import zone ----\n    const dropZoneStyle=`border:2.5px dashed ${this._dragOver?\"#FD8602\":\"#cdbf9f\"}; background:${this._dragOver?\"#fff6e6\":\"#fff\"}; border-radius:18px; padding:46px 24px; text-align:center; cursor:pointer; transition:all .15s; color:#a0936f;`;\n\n    // ---- profile ----\n    const profileLocked=!st.profileEdit;\n    const profileFieldStyle=`width:100%; padding:12px 14px; border:1.5px solid ${st.profileEdit?\"#FD8602\":\"#e3d8bd\"}; border-radius:11px; background:${st.profileEdit?\"#fff\":\"#faf4e6\"}; font-size:14.5px; font-family:inherit; outline:none; color:#121212;`;\n\n    return {\n      // screen flags\n      isLogin: st.screen===\"login\",\n      isApp, isScanner: st.screen===\"scanner\",\n      isAdmin, isAttendeeLike, isPresident,\n      // login\n      loginEmail:st.loginEmail, loginPassword:st.loginPassword,\n      onLoginEmail:(e)=>this.setState({loginEmail:e.target.value}),\n      onLoginPassword:(e)=>this.setState({loginPassword:e.target.value}),\n      roleChips, loginRoleLabel:(roleLabelMap[st.loginRole]||\"Attendee\").toUpperCase(),\n      onLogin:()=>this.login(), orgMarks,\n      // refs\n      setQrSmall:this.setQrSmall, setQrLarge:this.setQrLarge, setCamera:this.setCamera,\n      // tabs / user\n      navTabs, onLogout:()=>this.logout(),\n      userName, userFirstName, userInitials, userId:U.id||\"—\",\n      userBlock:U.block||presScope||\"—\", userSeat:U.seat||\"—\",\n      roleLabel:(roleLabelMap[role]||\"\").toUpperCase(),\n      // tab flags\n      tabDashboard: isAttendeeLike && st.tab===\"dashboard\",\n      tabQr: isAttendeeLike && st.tab===\"qr\",\n      tabSeating: isAttendeeLike && st.tab===\"seating\",\n      tabOversight: isPresident && st.tab===\"oversight\",\n      tabProfile: isAttendeeLike && st.tab===\"profile\",\n      tabOverview: isAdmin && st.tab===\"overview\",\n      tabAdminSeating: isAdmin && st.tab===\"adminseating\",\n      tabImport: isAdmin && st.tab===\"import\",\n      // dashboard\n      youStatusColor:S[youStatus].c, youStatusLabel:S[youStatus].label.toUpperCase(),\n      youStatusHint: youStatus===\"present\"?\"You're checked in. Enjoy the ceremony!\":youStatus===\"assigned\"?\"You haven't checked in yet. Head to any gate.\":youStatus===\"flagged\"?\"Your pass was flagged — please see a scanner.\":\"Marked as no-show. Contact your block president.\",\n      blockPresentCount, blockTotalCount,\n      eventFacts:[\n        {icon:\"◷\",label:\"DATE\",value:\"July 1, 2026 · Wednesday\"},\n        {icon:\"⚲\",label:\"VENUE\",value:\"Bulwagang Balagtas\"},\n        {icon:\"◔\",label:\"CALL TIME\",value:\"7:00 AM\"},\n        {icon:\"☂\",label:\"DRESS CODE\",value:\"Hardhat & formal attire\"}\n      ],\n      // seating\n      seats, legend, cellSize:cell, cellGap:Math.max(2,Math.round(cell*0.14)),\n      seatingTitle: presScope?(\"SEATING · \"+presScope):\"VENUE SEATING MAP\",\n      seatingSub: presScope?\"Filtered to your supervised block. Your seat is ringed.\":\"View-only. Your seat is highlighted — refresh to simulate live updates.\",\n      onRefresh:()=>this.refresh(),\n      // president\n      presidentBlock:presScope||\"\", blockStats, blockRoster:roster,\n      // profile\n      editName:st.editName, editEmail:st.editEmail,\n      onEditName:(e)=>this.setState({editName:e.target.value}),\n      onEditEmail:(e)=>this.setState({editEmail:e.target.value}),\n      profileLocked, profileFieldStyle,\n      onToggleEdit:()=>this.toggleEdit(),\n      profileBtnLabel: st.profileEdit?\"SAVE CHANGES\":\"EDIT PROFILE\",\n      profileBtnBg: st.profileEdit?\"#2E7D52\":\"#121212\", profileBtnFg:\"#F9EEDA\",\n      // admin overview\n      metrics, presentCount:M.present, chartBars, chartLine, chartArea, chartPoints, activity, blockTable,\n      goImport:()=>this.setState({tab:\"import\"}), goSeating:()=>this.setState({tab:\"adminseating\"}),\n      onExport:()=>this.exportData(),\n      // admin seating\n      seatSearch:st.seatSearch, onSeatSearch:(e)=>this.setState({seatSearch:e.target.value}),\n      fBlock:st.fBlock, fStatus:st.fStatus, blockOptions, statusOptions,\n      onFilterBlock:(e)=>this.setState({fBlock:e.target.value}), onFilterStatus:(e)=>this.setState({fStatus:e.target.value}),\n      onZoomIn:()=>this.zoom(3), onZoomOut:()=>this.zoom(-3), zoomLabel:cell+\"px\",\n      hasSelectedSeat: isAdmin && !!st.selectedSeat,\n      onCloseSeat:()=>this.setState({selectedSeat:null}),\n      selSeat:st.selectedSeat||\"\", selStatusLabel:S[selStatus].label, selTone:S[selStatus].c, selToneFg:S[selStatus].fg, selFields,\n      // import\n      onPickFile:()=>this.runImport(),\n      onDragOver:(e)=>{e.preventDefault(); if(!this._dragOver){this._dragOver=true; this.forceUpdate();}},\n      onDragLeave:(e)=>{e.preventDefault(); this._dragOver=false; this.forceUpdate();},\n      onDrop:(e)=>{e.preventDefault(); this._dragOver=false; this.runImport();},\n      onSample:()=>this.sampleCsv(), onSimImport:()=>this.runImport(),\n      dropZoneStyle, dropTitle:this._dragOver?\"Drop to upload\":\"Drag & drop CSV / Excel here\",\n      dropSub:\"or click to browse — up to 500 attendee records\",\n      importActive:st.importActive, importStage:st.importStage, importPct:st.importPct,\n      importDone:st.importDone, importValid:st.importValid, importErrors:st.importErrors, importTotal:st.importTotal,\n      // scanner\n      scannerName:U.scanner||\"Gate A · Reyes\",\n      scanTotal:st.scanStats.total, scanSuccess:st.scanStats.success, scanDup:st.scanStats.dup,\n      cameraIdle:!st.scanningOn, scanningOn:st.scanningOn,\n      onToggleCamera:()=>this.toggleCamera(),\n      camBtnLabel:st.scanningOn?\"STOP CAMERA\":\"START CAMERA\",\n      camBtnBg:st.scanningOn?\"#C2402F\":\"#2E7D52\", camBtnFg:\"#fff\",\n      onSimScan:()=>this.simulateScan(),\n      manualVal:st.manualVal, onManualInput:(e)=>this.setState({manualVal:e.target.value}), onManualScan:()=>this.manualScan(),\n      onToggleOffline:()=>this.setState(s=>({offlineOn:!s.offlineOn})),\n      onToggleSound:()=>this.setState(s=>({soundOn:!s.soundOn})),\n      offlineDot:st.offlineOn?\"●\":\"○\", soundIcon:st.soundOn?\"♪\":\"✕\",\n      offlineToggleStyle:`flex:1; display:flex; align-items:center; justify-content:center; gap:7px; padding:11px; border-radius:10px; cursor:pointer; font-family:inherit; font-size:13px; font-weight:600; border:1px solid rgba(249,238,218,.18); background:${st.offlineOn?\"rgba(255,191,0,.18)\":\"rgba(0,0,0,.25)\"}; color:${st.offlineOn?\"#FFBF00\":\"#cbbf9f\"};`,\n      soundToggleStyle:`flex:1; display:flex; align-items:center; justify-content:center; gap:7px; padding:11px; border-radius:10px; cursor:pointer; font-family:inherit; font-size:13px; font-weight:600; border:1px solid rgba(249,238,218,.18); background:${st.soundOn?\"rgba(46,125,82,.2)\":\"rgba(0,0,0,.25)\"}; color:${st.soundOn?\"#5fd49a\":\"#cbbf9f\"};`,\n      // scan modal\n      hasScanResult:!!sr,\n      scanResultColor:sr?sr.tone:\"#2E7D52\", scanResultIcon:sr?sr.icon:\"\",\n      scanResultTitle:sr?sr.title:\"\", scanResultName:sr?sr.name:\"\",\n      scanResultBlock:sr?sr.block:\"\", scanResultSeat:sr?sr.seat:\"\", scanResultSub:sr?sr.sub:\"\",\n      onScanNext:()=>this.scanNext(),\n      // toast\n      hasToast:!!st.toast, toastMsg:st.toast?st.toast.msg:\"\",\n      toastColor:st.toast?(st.toast.tone===\"warn\"?\"#FFBF00\":st.toast.tone===\"err\"?\"#C2402F\":\"#5fd49a\"):\"#5fd49a\",\n      toastIcon:st.toast?(st.toast.tone===\"warn\"?\"!\":st.toast.tone===\"err\"?\"×\":\"✓\"):\"✓\"\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
