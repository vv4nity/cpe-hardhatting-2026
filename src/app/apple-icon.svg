  <ellipse cx="128" cy="160" rx="100" ry="20" fill="#FD8602"/>
  <!-- dome -->
  <path d="M54 160a74 74 0 0 1 148 0Z" fill="#FFBF00"/>
  <!-- side ribs -->
  <g fill="none" stroke="#FD8602" stroke-width="9" stroke-linecap="round">
    <path d="M116 94Q94 119 92 156"/>
    <path d="M140 94Q162 119 164 156"/>
  </g>
  <!-- center ridge -->
  <path d="M113 95Q128 87 143 95L143 160 113 160Z" fill="#FD8602"/>
  <!-- shine -->
  <path d="M78 148a53 53 0 0 1 28 -49" fill="none" stroke="#F9EEDA" stroke-width="7" stroke-linecap="round" opacity=".35"/>
</svg>
